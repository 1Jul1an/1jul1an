name: Metrics

on:
  schedule:
    - cron: "0 8,20 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}

          user: 1Jul1an
          commits_authoring: 1Jul1an

          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes

          config_timezone: Europe/Berlin
          config_twemoji: yes

          plugin_introduction: yes
          plugin_introduction_title: About me

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_skipped: 1Jul1an/next.js, 1Jul1an/wordsearch

          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_repositories_limit: 4

          plugin_calendar: yes

          plugin_habits: yes

          plugin_repositories: yes
          plugin_repositories_featured: 1Jul1an/cloud-based-business-intelligence-app, 1Jul1an/cloud-based-wms-app, 1Jul1an/filesort, 1Jul1an/wordsearch

          plugin_stargazers: yes
          plugin_stargazers_worldmap: yes
          plugin_stargazers_worldmap_token: ${{ secrets.GEODB_TOKEN }}
